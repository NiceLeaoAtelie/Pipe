<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRM Pipe CNC - Paulo (Com Indicadores)</title>
    <style>
        :root {
            --fundo: #f0f2f5; --primary: #1a237e; --whatsapp: #25d366; --foto: #8e44ad; --origem: #e74c3c;
            --novo: #95a5a6; --qualif: #f1c40f; --orca: #3498db; --negoc: #e67e22; --ganho: #2ecc71; --perdido: #546e7a;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--fundo); margin: 0; padding: 15px; }
        .header { text-align: center; color: var(--primary); margin-bottom: 20px; }
        
        /* Dashboard de Indicadores */
        .dashboard { 
            display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); 
            gap: 10px; max-width: 900px; margin: 0 auto 20px auto; 
        }
        .card-indicador { 
            background: white; padding: 15px; border-radius: 10px; text-align: center; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.1); border-bottom: 4px solid #ccc;
        }
        .card-indicador span { display: block; font-size: 11px; text-transform: uppercase; color: #666; font-weight: bold; }
        .card-indicador strong { font-size: 18px; color: var(--primary); }
        .perc-conversao { border-bottom-color: var(--ganho); background: #e8f5e9; }

        .form-novo { background: white; padding: 20px; border-radius: 12px; max-width: 650px; margin: 0 auto 30px auto; box-shadow: 0 4px 10px rgba(0,0,0,0.1); border: 2px solid transparent; }
        .editando-modo { border-color: var(--orca); background: #f0f7ff; }
        
        .form-novo input, .form-novo textarea, .form-novo select { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 14px; }
        .btn-add { background: var(--primary); color: white; border: none; padding: 15px; width: 100%; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 16px; margin-top: 10px; }
        .btn-cancelar { background: #95a5a6; color: white; border: none; padding: 10px; width: 100%; border-radius: 6px; margin-top: 5px; cursor: pointer; display: none; }

        .pipe-container { display: flex; gap: 15px; overflow-x: auto; padding-bottom: 20px; align-items: flex-start; }
        .coluna { background: #ebedf0; min-width: 320px; border-radius: 10px; padding: 12px; box-shadow: inset 0 0 5px rgba(0,0,0,0.05); min-height: 450px; }
        .coluna h3 { font-size: 13px; text-transform: uppercase; color: #5e6c84; margin-bottom: 15px; border-bottom: 2px solid #ddd; padding-bottom: 5px; text-align: center; }

        .lead-nome { font-weight: bold; font-size: 17px; color: #172b4d; display: block; }
