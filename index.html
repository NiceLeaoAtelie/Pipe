<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRM Pipe CNC - Paulo</title>
    <style>
        :root {
            --fundo: #f0f2f5;
            --primary: #1a237e;
            --whatsapp: #25d366;
            --novo: #95a5a6; --qualif: #f1c40f; --orca: #3498db; --negoc: #e67e22; --ganho: #2ecc71;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--fundo); margin: 0; padding: 15px; }
        .header { text-align: center; color: var(--primary); margin-bottom: 20px; }
        
        /* Formulário */
        .form-novo { background: white; padding: 20px; border-radius: 12px; max-width: 600px; margin: 0 auto 30px auto; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .form-novo input, .form-novo textarea, .form-novo select { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 14px; }
        .btn-add { background: var(--primary); color: white; border: none; padding: 15px; width: 100%; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 16px; }

        /* Container do Pipe */
        .pipe-container { display: flex; gap: 15px; overflow-x: auto; padding-bottom: 20px; align-items: flex-start; }
        .coluna { background: #ebedf0; min-width: 300px; border-radius: 10px; padding: 12px; box-shadow: inset 0 0 5px rgba(0,0,0,0.05); }
        .coluna h3 { font-size: 13px; text-transform: uppercase; color: #5e6c84; margin-bottom: 15px; border-bottom: 2px solid #ddd; padding-bottom: 5px; }
        
        /* Cartão do Lead */
        .lead-card { background: white; border-radius: 8px; padding: 15px; margin-bottom: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); border-top: 6px solid #ccc; position: relative; }
        .lead-nome { font-weight: bold; font-size: 16px; color: #172b4d; display: block; margin-bottom: 5px; }
        .lead-info { font-size: 13px; color: #555; margin: 3px 0; }
        .lead-detalhes { font-size: 12px; color: #666; background: #f9f9f9; padding: 8px; border-radius: 4px; border-left: 3px solid #ddd; margin: 10px 0; font-style: italic; }
        .lead-valor { font-weight: bold; color: var(--primary); font-size: 15px; }

        /* Cores das Bordas */
        .status-Novo { border-top-color: var(--novo); }
        .status-Qualificação { border-top-color: var(--qualif); }
        .status-Orçamento { border-top-color: var(--orca); }
        .status-Negociação { border-top-color: var(--negoc); }
        .status-Ganho { border-top-color: var(--ganho); }

        .btn-zap { background: var(--whatsapp); color: white; border: none; padding: 8px 12px; border-radius: 4px; cursor: pointer; font-weight: bold; display: flex; align-items: center; gap: 5px; }
        .btn-zap:hover { opacity: 0.9; }
        select.mudar-status { padding: 8px; font-size: 12px; border-radius: 4px; border: 1px solid #ddd; flex-grow: 1; }
    </style>
</head>
<body>

<div class="header">
    <h2>🚀 Gestão de Leads CNC</h2>
</div>

<div class="form-novo">
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
        <input type="text" id="l_nome" placeholder="Nome do Cliente">
        <input type="text" id="l_zap" placeholder="WhatsApp (com DDD)">
    </div>
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
        <input type="number" id="l_valor" placeholder="Valor Estimado R$">
        <select id="l_status">
            <option value="Novo">Novo Lead</option>
            <option value="Qualificação">Qualificação</option>
            <option value="Orçamento">Orçamento Enviado</option>
            <option value="Negociação">Negociação</option>
            <option value="Ganho">Ganho (Virou Pedido)</option>
        </select>
    </div>
    <textarea id="l_obs" rows="3" placeholder="Detalhes da conversa (o que o cliente quer, medidas, material...)"></textarea>
    <button class="btn-add" onclick="adicionarLead()">➕ CADASTRAR NO SISTEMA</button>
</div>

<div class="pipe-container" id="pipe_grid">
    </div>

<script>
    // ⚠️ COLOQUE SEU LINK DO GOOGLE SCRIPT AQUI ABAIXO
    const SCRIPT_URL = "SUA_URL_DO_GOOGLE_SCRIPT_AQUI"; 

    let leads = [];
    const fases = [
        { id: "Novo", titulo: "🆕 Novos" },
        { id: "Qualificação", titulo: "🔍 Qualificação" },
        { id: "Orçamento", titulo: "📄 Orçamento" },
        { id: "Negociação", titulo: "🤝 Negociação" },
        { id: "Ganho", titulo: "💰 Ganhos" }
    ];

    async function carregar() {
        document.getElementById('pipe_grid').innerHTML = "Carregando leads...";
        try {
            const res = await fetch(SCRIPT_URL);
            leads = await res.json();
            renderizar();
        } catch (e) { document.getElementById('pipe_grid').innerHTML = "Erro ao carregar dados."; }
    }

    function renderizar() {
        const grid = document.getElementById('pipe_grid');
        grid.innerHTML = '';

        fases.forEach(fase => {
            const col = document.createElement('div');
            col.className = 'coluna';
            col.innerHTML = `<h3>${fase.titulo}</h3>`;

            const filtrados = leads.filter(l => l.status === fase.id);
            filtrados.forEach(l => {
                const card = document.createElement('div');
                card.className = `lead-card status-${l.status}`;
                card.innerHTML = `
                    <span class="lead-nome">${l.nome}</span>
                    <div class="lead-info">📞 ${l.contato}</div>
                    <div class="lead-valor">R$ ${parseFloat(l.valor || 0).toFixed(2)}</div>
                    <div class="lead-detalhes">${l.obs || 'Sem detalhes anotados.'}</div>
                    
                    <div style="display:flex; gap:5px; margin-top:10px;">
                        <select class="mudar-status" onchange="mudarStatus('${l.id}', this.value)">
                            ${fases.map(f => `<option value="${f.id}" ${f.id === l.status ? 'selected' : ''}>Mover para ${f.id}</option>`).join('')}
                        </select>
                        <button class="btn-zap" onclick="falarZap('${l.contato}', '${l.nome}', '${l.status}')">Zap</button>
                    </div>
                `;
                col.appendChild(card);
            });
            grid.appendChild(col);
        });
    }

    async function adicionarLead() {
        const nome = document.getElementById('l_nome').value;
        const zap = document.getElementById('l_zap').value;
        const valor = document.getElementById('l_valor').value;
        const status = document.getElementById('l_status').value;
        const obs = document.getElementById('l_obs').value;

        if(!nome || !zap) return alert("Nome e WhatsApp são obrigatórios!");

        const payload = {
            action: "addLead",
            id: String(Date.now()),
            nome, contato: zap, valor, status, obs
        };

        try {
            await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
            alert("Lead salvo com sucesso!");
            location.reload(); // Recarrega para mostrar o novo
        } catch(e) { alert("Erro ao salvar
