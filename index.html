<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRM Pipe CNC - Paulo</title>
    <style>
        :root {
            --fundo: #f0f2f5; --primary: #1a237e; --whatsapp: #25d366; --foto: #8e44ad; --origem: #e74c3c;
            --novo: #95a5a6; --qualif: #f1c40f; --orca: #3498db; --negoc: #e67e22; --ganho: #2ecc71; --perdido: #546e7a;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--fundo); margin: 0; padding: 15px; }
        .header { text-align: center; color: var(--primary); margin-bottom: 20px; }
        
        .form-novo { background: white; padding: 20px; border-radius: 12px; max-width: 650px; margin: 0 auto 30px auto; box-shadow: 0 4px 10px rgba(0,0,0,0.1); border: 2px solid transparent; }
        .editando-modo { border-color: var(--orca); background: #f0f7ff; }
        
        .form-novo input, .form-novo textarea, .form-novo select { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 14px; }
        .btn-add { background: var(--primary); color: white; border: none; padding: 15px; width: 100%; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 16px; margin-top: 10px; }
        .btn-cancelar { background: #95a5a6; color: white; border: none; padding: 10px; width: 100%; border-radius: 6px; margin-top: 5px; cursor: pointer; display: none; }

        .pipe-container { display: flex; gap: 15px; overflow-x: auto; padding-bottom: 20px; align-items: flex-start; }
        .coluna { background: #ebedf0; min-width: 320px; border-radius: 10px; padding: 12px; box-shadow: inset 0 0 5px rgba(0,0,0,0.05); min-height: 450px; }
        .coluna h3 { font-size: 13px; text-transform: uppercase; color: #5e6c84; margin-bottom: 15px; border-bottom: 2px solid #ddd; padding-bottom: 5px; text-align: center; }
        
        .lead-card { background: white; border-radius: 8px; padding: 15px; margin-bottom: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); border-top: 6px solid #ccc; transition: 0.2s; }
        .lead-nome { font-weight: bold; font-size: 17px; color: #172b4d; display: block; }
        .lead-origem { display: inline-block; background: #fff5f5; color: var(--origem); font-size: 11px; font-weight: bold; padding: 2px 8px; border-radius: 10px; border: 1px solid var(--origem); margin-bottom: 8px; text-transform: uppercase; }
        .lead-detalhes { font-size: 12px; color: #444; background: #f4f7f6; padding: 10px; border-radius: 6px; border-left: 3px solid #ccc; margin: 12px 0; font-style: italic; white-space: pre-wrap; }
        .lead-valor { font-weight: bold; color: var(--primary); font-size: 16px; display: block; }

        .status-Novo { border-top-color: var(--novo); }
        .status-Qualificação { border-top-color: var(--qualif); }
        .status-Orçamento { border-top-color: var(--orca); }
        .status-Negociação { border-top-color: var(--negoc); }
        .status-Ganho { border-top-color: var(--ganho); }
        .status-Perdido { border-top-color: var(--perdido); opacity: 0.7; }

        .acoes { display: flex; gap: 5px; margin-top: 15px; border-top: 1px solid #eee; padding-top: 10px; flex-wrap: wrap; }
        .btn-zap { background: var(--whatsapp); color: white; border: none; padding: 8px 12px; border-radius: 4px; cursor: pointer; font-weight: bold; flex-grow: 1; }
        .btn-edit { background: #3498db; color: white; border: none; padding: 8px; border-radius: 4px; cursor: pointer; }
        .btn-del { background: #ff4d4d; color: white; border: none; padding: 8px; border-radius: 4px; cursor: pointer; }
        select.mudar-status { padding: 8px; font-size: 12px; border-radius: 4px; border: 1px solid #ddd; width: 100px; }
    </style>
</head>
<body>

<div class="header">
    <h2>🚀 CRM Pipe CNC - Paulo</h2>
</div>

<div class="form-novo" id="meuForm">
    <input type="hidden" id="edit_id"> 
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
        <input type="text" id="l_nome" placeholder="Nome do Cliente">
        <input type="text" id="l_zap" placeholder="WhatsApp (DDD + Número)">
    </div>
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
        <input type="number" id="l_valor" placeholder="Valor Estimado R$">
        <select id="l_origem">
            <option value="">Origem (Canal)</option>
            <option value="Instagram">Instagram</option>
            <option value="WhatsApp">WhatsApp</option>
            <option value="Indicação">Indicação</option>
            <option value="OLX">OLX</option>
            <option value="Facebook">Facebook</option>
            <option value="TikTok">TikTok</option>
            <option value="Outros">Outros</option>
        </select>
    </div>
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
        <select id="l_status">
            <option value="Novo">Novo Lead</option>
            <option value="Qualificação">Qualificação</option>
            <option value="Orçamento">Orçamento Enviado</option>
            <option value="Negociação">Negociação</option>
            <option value="Ganho">Ganho (Pedido)</option>
            <option value="Perdido">Perdido (Desistiu)</option>
        </select>
        <input type="text" id="l_foto_link" placeholder="Link da Foto do Tecido">
    </div>
    
    <textarea id="l_obs" rows="3" placeholder="Detalhes da conversa e anotações técnicas..."></textarea>
    <button class="btn-add" id="btnAcao" onclick="adicionarOuSalvar()">➕ CADASTRAR NO MEU PIPE</button>
    <button class="btn-cancelar" id="btnCancel" onclick="cancelarEdicao()">Cancelar Edição</button>
</div>

<div class="pipe-container" id="pipe_grid"></div>

<script>
    const fases = [
        { id: "Novo", titulo: "🆕 Novos" },
        { id: "Qualificação", titulo: "🔍 Qualificação" },
        { id: "Orçamento", titulo: "📄 Orçamento" },
        { id: "Negociação", titulo: "🤝 Negociação" },
        { id: "Ganho", titulo: "💰 Ganhos" },
        { id: "Perdido", titulo: "🛑 Perdido" }
    ];

    let leads = JSON.parse(localStorage.getItem('leads_cnc_v3')) || [];

    function renderizar() {
        const grid = document.getElementById('pipe_grid');
        grid.innerHTML = '';

        fases.forEach(fase => {
            const col = document.createElement('div');
            col.className = 'coluna';
            col.innerHTML = `<h3>${fase.titulo}</h3>`;

            const filtrados = leads.filter(l => l.status === fase.id);
            filtrados.forEach(l => {
                const card = document.createElement('div');
                card.className = `lead-card status-${l.status}`;
                
                let htmlOrigem = l.origem ? `<span class="lead-origem">📍 ${l.origem}</span>` : '';

                card.innerHTML = `
                    ${htmlOrigem}
                    <span class="lead-nome">${l.nome}</span>
                    <div class="lead-info">📞 ${l.contato || 'Sem WhatsApp'}</div>
                    <span class="lead-valor">R$ ${parseFloat(l.valor || 0).toFixed(2)}</span>
                    <div class="lead-detalhes">${l.obs || 'Sem detalhes.'}</div>
                    <div class="acoes">
                        <select class="mudar-status" onchange="mudarStatus('${l.id}', this.value)">
                            ${fases.map(f => `<option value="${f.id}" ${f.id === l.status ? 'selected' : ''}>Mover</option>`).join('')}
                        </select>
                        <button class="btn-edit" onclick="prepararEdicao('${l.id}')" title="Editar Card">📝</button>
                        <button class="btn-zap" onclick="falarZap('${l.contato}', '${l.nome}')">Zap</button>
                        <button class="btn-del" onclick="deletarLead('${l.id}')">🗑️</button>
                    </div>
                `;
                col.appendChild(card);
            });
            grid.appendChild(col);
        });
        localStorage.setItem('leads_cnc_v3', JSON.stringify(leads));
    }

    function adicionarOuSalvar() {
        const idEdit = document.getElementById('edit_id').value;
        const nome = document.getElementById('l_nome').value;
        const zap = document.getElementById('l_zap').value;
        const valor = document.getElementById('l_valor').value;
        const status = document.getElementById('l_status').value;
        const obs = document.getElementById('l_obs').value;
        const fotoLink = document.getElementById('l_foto_link').value;
        const origem = document.getElementById('l_origem').value;

        if(!nome) return alert("Preencha ao menos o nome do cliente!");

        if(idEdit) {
            leads = leads.map(l => l.id === idEdit ? { ...l, nome, contato: zap, valor, status, obs, fotoLink, origem } : l);
            cancelarEdicao();
        } else {
            const novoLead = { id: Date.now().toString(), nome, contato: zap, valor, status, obs, fotoLink, origem };
            leads.push(novoLead);
        }

        renderizar();
        limparCampos();
    }

    function prepararEdicao(id) {
        const lead = leads.find(l => l.id === id);
        if(!lead) return;

        document.getElementById('edit_id').value = lead.id;
        document.getElementById('l_nome').value = lead.nome;
        document.getElementById('l_zap').value = lead.contato || '';
        document.getElementById('l_valor').value = lead.valor || '';
        document.getElementById('l_status').value = lead.status;
        document.getElementById('l_obs').value = lead.obs || '';
        document.getElementById('l_foto_link').value = lead.fotoLink || '';
        document.getElementById('l_origem').value = lead.origem || '';

        document.getElementById('btnAcao').innerText = "💾 SALVAR ALTERAÇÕES";
        document.getElementById('btnAcao').style.background = "#2ecc71";
        document.getElementById('meuForm').classList.add('editando-modo');
        document.getElementById('btnCancel').style.display = "block";
        window.scrollTo(0,0);
    }

    function cancelarEdicao() {
        document.getElementById('edit_id').value = "";
        document.getElementById('btnAcao').innerText = "➕ CADASTRAR NO MEU PIPE";
        document.getElementById('btnAcao').style.background = "#1a237e";
        document.getElementById('meuForm').classList.remove('editando-modo');
        document.getElementById('btnCancel').style.display = "none";
        limparCampos();
    }

    function limparCampos() {
        document.getElementById('l_nome').value = '';
        document.getElementById('l_zap').value = '';
        document.getElementById('l_valor').value = '';
        document.getElementById('l_obs').value = '';
        document.getElementById('l_foto_link').value = '';
        document.getElementById('l_origem').value = '';
        document.getElementById('l_status').value = 'Novo';
    }

    function mudarStatus(id, novoStatus) {
        leads = leads.map(l => l.id === id ? {...l, status: novoStatus} : l);
        renderizar();
    }

    function deletarLead(id) {
        if(confirm("Deseja excluir este lead?")) {
            leads = leads.filter(l => l.id !== id);
            renderizar();
        }
    }

    function falarZap(tel, nome) {
        if(!tel) return alert("Sem WhatsApp cadastrado!");
        let num = tel.replace(/\D/g, '');
        if(!num.startsWith('55')) num = '55' + num;
        window.open(`https://wa.me/${num}?text=Olá ${nome}, tudo bem?`, '_blank');
    }

    renderizar();
</script>
</body>
</html>
