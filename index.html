<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRM Interno CNC - Paulo</title>
    <style>
        :root {
            --fundo: #f0f2f5; --primary: #1a237e; --whatsapp: #25d366; --foto: #8e44ad; --canal: #6c5ce7;
            --novo: #95a5a6; --qualif: #f1c40f; --orca: #3498db; --negoc: #e67e22; --ganho: #2ecc71;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--fundo); margin: 0; padding: 15px; }
        .header { text-align: center; color: var(--primary); margin-bottom: 20px; }
        
        /* Formulário */
        .form-novo { background: white; padding: 20px; border-radius: 12px; max-width: 600px; margin: 0 auto 30px auto; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .form-novo input, .form-novo textarea, .form-novo select { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 14px; }
        .btn-add { background: var(--primary); color: white; border: none; padding: 15px; width: 100%; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 16px; }

        /* Container do Pipe */
        .pipe-container { display: flex; gap: 15px; overflow-x: auto; padding-bottom: 20px; align-items: flex-start; }
        .coluna { background: #ebedf0; min-width: 310px; border-radius: 10px; padding: 12px; box-shadow: inset 0 0 5px rgba(0,0,0,0.05); min-height: 400px; }
        .coluna h3 { font-size: 13px; text-transform: uppercase; color: #5e6c84; margin-bottom: 15px; border-bottom: 2px solid #ddd; padding-bottom: 5px; text-align: center; }
        
        /* Cartão do Lead */
        .lead-card { background: white; border-radius: 8px; padding: 15px; margin-bottom: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); border-top: 6px solid #ccc; position: relative; }
        .lead-nome { font-weight: bold; font-size: 17px; color: #172b4d; display: block; }
        .lead-info { font-size: 13px; color: #555; margin: 3px 0; }
        
        /* Etiqueta de Canal */
        .badge-canal { font-size: 10px; background: var(--canal); color: white; padding: 2px 6px; border-radius: 10px; text-transform: uppercase; font-weight: bold; }
        
        .lead-detalhes { font-size: 12px; color: #444; background: #f4f7f6; padding: 10px; border-radius: 6px; border-left: 3px solid #ccc; margin: 12px 0; font-style: italic; white-space: pre-wrap; word-wrap: break-word; }
        .lead-valor { font-weight: bold; color: var(--primary); font-size: 15px; }
        .link-foto { display: inline-block; font-size: 11px; color: var(--foto); text-decoration: none; font-weight: bold; margin-bottom: 5px; border: 1px solid var(--foto); padding: 2px 6px; border-radius: 4px; }

        .status-Novo { border-top-color: var(--novo); }
        .status-Qualificação { border-top-color: var(--qualif); }
        .status-Orçamento { border-top-color: var(--orca); }
        .status-Negociação { border-top-color: var(--negoc); }
        .status-Ganho { border-top-color: var(--ganho); }

        .acoes { display: flex; gap: 5px; margin-top: 15px; border-top: 1px solid #eee; padding-top: 10px; }
        .btn-zap { background: var(--whatsapp); color: white; border: none; padding: 8px 12px; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 12px; flex-grow: 1; }
        .btn-del { background: #ff4d4d; color: white; border: none; padding: 8px; border-radius: 4px; cursor: pointer; opacity: 0.6; }
    </style>
</head>
<body>

<div class="header">
    <h2>🚀 CRM Local CNC - Paulo</h2>
</div>

<div class="form-novo">
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
        <input type="text" id="l_nome" placeholder="Nome do Cliente">
        <input type="text" id="l_zap" placeholder="WhatsApp (com DDD)">
    </div>
    <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px;">
        <input type="number" id="l_valor" placeholder="Valor R$">
        <select id="l_canal">
            <option value="Instagram">Instagram</option>
            <option value="WhatsApp">WhatsApp</option>
            <option value="Indicação">Indicação</option>
            <option value="Google">Google</option>
            <option value="Outros">Outros</option>
        </select>
        <select id="l_status">
            <option value="Novo">Novo Lead</option>
            <option value="Qualificação">Qualificação</option>
            <option value="Orçamento">Orçamento</option>
            <option value="Negociação">Negociação</option>
            <option value="Ganho">Ganho</option>
        </select>
    </div>
    <input type="text" id="l_foto_link" placeholder="Link da Foto do Tecido/Referência">
    <textarea id="l_obs" rows="3" placeholder="Detalhes da conversa..."></textarea>
    <button class="btn-add" onclick="adicionarLead()">➕ CADASTRAR AGORA</button>
</div>

<div class="pipe-container" id="pipe_grid"></div>

<script>
    const fases = [
        { id: "Novo", titulo: "🆕 Novos" },
        { id: "Qualificação", titulo: "🔍 Qualificação" },
        { id: "Orçamento", titulo: "📄 Orçamento" },
        { id: "Negociação", titulo: "🤝 Negociação" },
        { id: "Ganho", titulo: "💰 Ganhos" }
    ];

    let leads = JSON.parse(localStorage.getItem('leads_cnc_v3')) || [];

    function renderizar() {
        const grid = document.getElementById('pipe_grid');
        grid.innerHTML = '';

        fases.forEach(fase => {
            const col = document.createElement('div');
            col.className = 'coluna';
            col.innerHTML = `<h3>${fase.titulo}</h3>`;

            const filtrados = leads.filter(l => l.status === fase.id);
            filtrados.forEach(l => {
                const card = document.createElement('div');
                card.className = `lead-card status-${l.status}`;
                let htmlFoto = l.fotoLink ? `<a href="${l.fotoLink}" target="_blank" class="link-foto">📸 Foto Referência</a>` : '';

                card.innerHTML = `
                    <span class="badge-canal">${l.canal}</span>
                    <span class="lead-nome" style="margin-top:5px;">${l.nome}</span>
                    <div class="lead-info">📞 ${l.contato}</div>
                    <span class="lead-valor">R$ ${parseFloat(l.valor || 0).toFixed(2)}</span>
                    ${htmlFoto}
                    <div class="lead-detalhes">${l.obs || 'Sem detalhes.'}</div>
                    <div class="acoes">
                        <select class="mudar-status" onchange="mudarStatus('${l.id}', this.value)">
                            ${fases.map(f => `<option value="${f.id}" ${f.id === l.status ? 'selected' : ''}>Mover</option>`).join('')}
                        </select>
                        <button class="btn-zap" onclick="falarZap('${l.contato}', '${l.nome}', '${l.status}')">Zap</button>
                        <button class="btn-del" onclick="deletarLead('${l.id}')">🗑️</button>
                    </div>
                `;
                col.appendChild(card);
            });
            grid.appendChild(col);
        });
        localStorage.setItem('leads_cnc_v3', JSON.stringify(leads));
    }

    function adicionarLead() {
        const nome = document.getElementById('l_nome').value;
        const zap = document.getElementById('l_zap').value;
        const valor = document.getElementById('l_valor').value;
        const canal = document.getElementById('l_canal').value;
        const status = document.getElementById('l_status').value;
        const obs = document.getElementById('l_obs').value;
        const fotoLink = document.getElementById('l_foto_link').value;

        if(!nome || !zap) return alert("Preencha Nome e WhatsApp!");

        const novoLead = { id: Date.now().toString(), nome, contato: zap, valor, canal, status, obs, fotoLink };
        leads.push(novoLead);
        renderizar();
        
        // Limpar
        ['l_nome', 'l_zap', 'l_valor', 'l_obs', 'l_foto_link'].forEach(id => document.getElementById(id).value = '');
    }

    function mudarStatus(id, novoStatus) {
        leads = leads.map(l => l.id === id ? {...l, status: novoStatus} : l);
        renderizar();
    }

    function deletarLead(id) {
        if(confirm("Excluir este lead?")) {
            leads = leads.filter(l => l.id !== id);
            renderizar();
        }
    }

    function falarZap(tel, nome, status) {
        let num = tel.replace(/\D/g, '');
        if(!num.startsWith('55')) num = '55' + num;
        window.open(`https://wa.me/${num}?text=${encodeURIComponent('Olá ' + nome + ', tudo bem? Aqui é o Paulo da CNC.')}`, '_blank');
    }

    renderizar();
</script>
</body>
</html>
